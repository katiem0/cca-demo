name: Copilot Setup Steps

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The firm bootstrap installs packages from the internal Artifactory index.
      # Override ARTIFACTORY_PYPI_INDEX at the workflow / org level to point at the
      # firm-approved mirror; the public URL below is only for the open-source rehearsal.
      - name: Install dependencies from Artifactory
        env:
          ARTIFACTORY_PYPI_INDEX: ${{ vars.ARTIFACTORY_PYPI_INDEX || 'https://pypi.org/simple' }}
        run: |
          python -m pip install \
            --index-url "$ARTIFACTORY_PYPI_INDEX" \
            -r requirements.txt -r requirements-dev.txt

      - name: Install Jira commit-message hook
        run: ./scripts/install-hooks.sh
