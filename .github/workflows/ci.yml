name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Demo failure for Dependabot pydantic 2.11.5 PRs
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]' }}
        run: |
          if grep -R --include='requirements*.txt' -n '^pydantic==2\.11\.5$' .; then
            echo "::error::Demo failure: Dependabot PRs that update pydantic to 2.11.5 fail this CI check so CCA can fix it."
            exit 1
          fi

          echo "No demo-only pydantic==2.11.5 failure detected."
